<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>சாந்தி டெய்லர் அளவு கால்குலேட்டர்</title>
<style>
  :root{
    --cream:#f6efe4;
    --paper:#fffaf1;
    --maroon:#7a1f2b;
    --maroon-dark:#5c1620;
    --gold:#b8873a;
    --gold-light:#e8c780;
    --ink:#2c2420;
    --thread:#c94f4f;
    --line:#e4d6bd;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:
      repeating-linear-gradient(135deg, rgba(184,135,58,0.05) 0px, rgba(184,135,58,0.05) 2px, transparent 2px, transparent 14px),
      var(--cream);
    font-family: "Noto Sans Tamil","Latha","Segoe UI",sans-serif;
    color: var(--ink);
    min-height:100vh;
    padding: 32px 16px 60px;
  }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
  }

  /* Header - measuring tape motif */
  header{
    text-align:center;
    margin-bottom: 28px;
    position:relative;
  }

  .tape{
    height: 26px;
    background: repeating-linear-gradient(
      90deg,
      var(--gold) 0px, var(--gold) 2px,
      var(--gold-light) 2px, var(--gold-light) 10px
    );
    border-radius: 4px;
    border: 2px solid var(--maroon-dark);
    margin: 0 auto 18px;
    max-width: 320px;
    position:relative;
  }
  .tape::before, .tape::after{
    content:"";
    position:absolute;
    top:50%; transform:translateY(-50%);
    width:10px; height:10px;
    background: var(--maroon-dark);
    border-radius:50%;
  }
  .tape::before{ left:-5px; }
  .tape::after{ right:-5px; }

  h1{
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: var(--maroon-dark);
    margin: 0 0 6px;
    letter-spacing: 0.3px;
  }

  .subtitle{
    color:#8a7a63;
    font-size:0.95rem;
    margin:0;
  }

  /* Form card */
  .card{
    background: var(--paper);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(90,40,20,0.10), 0 2px 8px rgba(90,40,20,0.06);
    border: 1px solid var(--line);
    padding: 28px 24px;
    margin-bottom: 26px;
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:6px;
    background: linear-gradient(var(--maroon), var(--thread));
  }

  .card h2{
    margin:0 0 20px;
    font-size:1.15rem;
    color: var(--maroon-dark);
    display:flex;
    align-items:center;
    gap:10px;
  }

  .card h2::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--line);
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px 18px;
  }

  @media (max-width: 540px){
    .grid{ grid-template-columns: 1fr; }
  }

  .field{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .field label{
    font-size:0.92rem;
    color: var(--ink);
    font-weight:600;
  }

  .field .short{
    color:#a08a63;
    font-weight:400;
    font-size:0.8rem;
  }

  .field input{
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--line);
    background: #fffdf9;
    font-size: 1rem;
    color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }

  .field input:focus{
    outline:none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,135,58,0.18);
  }

  .field input:invalid:not(:placeholder-shown){
    border-color: var(--thread);
  }

  /* Calculate button */
  .calc-btn{
    display:block;
    width:100%;
    margin: 26px 0 0;
    padding: 16px;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--paper);
    background: linear-gradient(135deg, var(--maroon) 0%, var(--maroon-dark) 100%);
    border:none;
    border-radius: 14px;
    cursor:pointer;
    box-shadow: 0 8px 20px rgba(122,31,43,0.35);
    transition: transform .12s ease, box-shadow .12s ease;
    font-family: inherit;
  }
  .calc-btn:hover{ transform: translateY(-2px); box-shadow: 0 12px 26px rgba(122,31,43,0.4); }
  .calc-btn:active{ transform: translateY(0); }

  .error-msg{
    color: var(--thread);
    font-size:0.9rem;
    text-align:center;
    margin-top:12px;
    min-height: 1.2em;
  }

  /* Results card */
  .results{
    background: var(--paper);
    border-radius: 18px;
    border: 1px solid var(--line);
    box-shadow: 0 10px 30px rgba(90,40,20,0.10);
    padding: 28px 24px;
    display:none;
  }

  .results.show{ display:block; animation: fadeUp .35s ease; }

  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(10px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .results h2{
    margin:0 0 20px;
    font-size:1.2rem;
    color: var(--maroon-dark);
    text-align:center;
  }

  .result-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  @media (max-width: 540px){
    .result-grid{ grid-template-columns: 1fr; }
  }

  .result-item{
    background: var(--cream);
    border: 1px dashed var(--gold);
    border-radius: 12px;
    padding: 14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap: 10px;
  }

  .result-item .r-label{
    font-size:0.88rem;
    color: var(--ink);
    font-weight:600;
  }

  .result-item .r-value{
    font-size:1.15rem;
    font-weight:700;
    color: var(--maroon-dark);
    white-space:nowrap;
  }

  .result-item .r-value::after{
    content:" in";
    font-size:0.7rem;
    font-weight:400;
    color:#a08a63;
  }

  footer{
    text-align:center;
    color:#a08a63;
    font-size:0.82rem;
    margin-top: 30px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="tape"></div>
    <h1>சாந்தி டெய்லர் அளவு கால்குலேட்டர்</h1>
    <p class="subtitle">Santhi Tailor Measurement Calculator</p>
  </header>

  <div class="card">
    <h2>அளவுகள் (Measurements)</h2>
    <form id="measureForm" novalidate>
      <div class="grid">
        <div class="field">
          <label for="us">உடல் சுற்றளவு <span class="short">(US)</span></label>
          <input type="number" id="us" name="us" step="0.01" min="0" required placeholder="எ.கா. 36">
        </div>
        <div class="field">
          <label for="ms">மார்பு சுற்றளவு <span class="short">(MS)</span></label>
          <input type="number" id="ms" name="ms" step="0.01" min="0" required placeholder="எ.கா. 38">
        </div>
        <div class="field">
          <label for="is">இடுப்பு சுற்றளவு <span class="short">(IS)</span></label>
          <input type="number" id="is" name="is" step="0.01" min="0" required placeholder="எ.கா. 32">
        </div>
        <div class="field">
          <label for="sh">சோல்டர் <span class="short">(SH)</span></label>
          <input type="number" id="sh" name="sh" step="0.01" min="0" required placeholder="எ.கா. 14">
        </div>
        <div class="field">
          <label for="kn">கை நீளம் <span class="short">(KN)</span></label>
          <input type="number" id="kn" name="kn" step="0.01" min="0" required placeholder="எ.கா. 10">
        </div>
        <div class="field">
          <label for="ks">கை சுற்றளவு <span class="short">(KS)</span></label>
          <input type="number" id="ks" name="ks" step="0.01" min="0" required placeholder="எ.கா. 12">
        </div>
        <div class="field">
          <label for="as">ஆம் சுற்றளவு <span class="short">(AS)</span></label>
          <input type="number" id="as" name="as" step="0.01" min="0" required placeholder="எ.கா. 16">
        </div>
      </div>

      <button type="submit" class="calc-btn">Calculate</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>
  </div>

  <div class="results" id="resultsCard">
    <h2>கணக்கிடப்பட்ட அளவுகள் (Results)</h2>
    <div class="result-grid" id="resultGrid"></div>
  </div>

  <footer>சாந்தி டெய்லர்ஸ் &middot; அனைத்து அளவுகளும் அங்குலத்தில் (inches)</footer>
</div>

<script>
  const form = document.getElementById('measureForm');
  const resultsCard = document.getElementById('resultsCard');
  const resultGrid = document.getElementById('resultGrid');
  const errorMsg = document.getElementById('errorMsg');

  const fieldIds = ['us','ms','is','sh','kn','ks','as'];

  form.addEventListener('submit', function(e){
    e.preventDefault();
    errorMsg.textContent = '';

    const values = {};
    let hasError = false;

    fieldIds.forEach(id => {
      const el = document.getElementById(id);
      const val = parseFloat(el.value);
      if (el.value.trim() === '' || isNaN(val)) {
        hasError = true;
      }
      values[id] = val;
    });

    if (hasError) {
      errorMsg.textContent = 'தயவுசெய்து அனைத்து புலங்களையும் நிரப்பவும் (Please fill in all fields with valid numbers).';
      resultsCard.classList.remove('show');
      return;
    }

    const { us, ms, is: isVal, sh, kn, ks, as: asVal } = values;

    const body = (us / 4) + 0.5;
    const armIrakkam = us / 6;
    const shoulder = (sh / 2) - 1.25;
    const neckWidth = us / 12;
    const backDotHeight = ms / 4;
    const frontDotHeightFromTop = (ms / 4) + 0.5;
    const frontDotHeightFromBottom = (frontDotHeightFromTop / 2) - 1;
    const dotToCenter = frontDotHeightFromBottom + 0.5;
    const frontDotWidth = (ms - isVal) / 2;
    const melKaiAlavu = (asVal/2) - 1;
    const keelKaiAlavu = melKaiAlavu/2;
    

    const round2 = (n) => (Math.round(n * 100) / 100).toFixed(2);

    const results = [
      { label: 'Body', value: round2(body) },
      { label: 'Arm Irakkam', value: round2(armIrakkam) },
      { label: 'Shoulder', value: round2(shoulder) },
      { label: 'Neck Agalam', value: round2(neckWidth) },
      { label: 'Back Dot Height', value: round2(backDotHeight) },
      { label: 'Front Dot Height From Top', value: round2(frontDotHeightFromTop) },
      { label: 'Front Dot Height From Bottom', value: round2(frontDotHeightFromBottom) },
      { label: 'Dot To Center', value: round2(dotToCenter) },
      { label: 'Front Dot Width', value: round2(frontDotWidth) },
      { label: 'மேல் கை அளவு ', value: round2(melKaiAlavu) },
      { label: 'கீழ் கை அளவு ', value: round2(keelKaiAlavu) },
    ];

    resultGrid.innerHTML = results.map(r => `
      <div class="result-item">
        <span class="r-label">${r.label}</span>
        <span class="r-value">${r.value}</span>
      </div>
    `).join('');

    resultsCard.classList.add('show');
    resultsCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
</script>

</body>
</html>
